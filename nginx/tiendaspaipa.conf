server {
    listen 80;
    server_name prestashop.monster www.prestashop.monster;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name prestashop.monster www.prestashop.monster;

    ssl_certificate /etc/letsencrypt/live/prestashop.monster/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prestashop.monster/privkey.pem;

    location / {
        proxy_pass http://10.10.0.2:8080;
        proxy_set_header Host prestashop.monster;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host prestashop.monster;
        proxy_set_header X-Forwarded-Port 443;
        proxy_redirect off;
        proxy_read_timeout 300;
    }
}
